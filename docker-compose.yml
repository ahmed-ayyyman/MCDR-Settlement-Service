services:
  mongo:
    image: mongo:7
    container_name: mcdr-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Keycloak stores its own config (realms, users, clients) in a relational
  # DB. This postgres instance is Keycloak's private storage — the app's
  # own data still lives entirely in Mongo above.
  keycloak-db:
    image: postgres:16-alpine
    container_name: mcdr-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: mcdr-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      - keycloak-db

  backend:
    build: ./backend
    container_name: mcdr-backend
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/mcdr
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongo
      - keycloak

volumes:
  mongo-data:
  keycloak-db-data:
